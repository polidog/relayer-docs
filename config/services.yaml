services:
  _defaults:
    autowire: true
    autoconfigure: true
    public: true

  # The documentation store. The backend (Turso vs. a local SQLite
  # file under var/) is selected by the factory from the configuration
  # injected here. The app.turso_* / app.docs_db_path parameters are
  # resolved from the environment by AppConfigurator (the composition
  # root) before the container compiles. autowire is off because the
  # concrete SqlConnection is chosen at runtime by the factory, not by
  # the container.
  App\Docs\DocStore:
    factory: ['App\Docs\DocStoreFactory', 'create']
    arguments:
      - '%app.project_root%'
      - '%app.turso_url%'
      - '%app.turso_token%'
      - '%app.docs_db_path%'
    autowire: false
    public: true
