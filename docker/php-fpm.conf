[www]
; Cloud Run injects config (APP_ENV, TURSO_*) as process env vars.
; php-fpm clears the worker environment by default, which would hide
; them from getenv()/$_SERVER — keep it so DocStoreFactory can read
; the Turso credentials.
clear_env = no

; Surface PHP warnings/errors and error_log output to the container
; logs (stderr) rather than swallowing them.
catch_workers_output = yes
decorate_workers_output = no
access.log = /proc/self/fd/2
