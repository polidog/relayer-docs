worker_processes auto;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile      on;
    tcp_nopush    on;
    server_tokens off;
    client_max_body_size 8m;

    # Cloud Run captures stdout/stderr as logs.
    access_log /dev/stdout;
    error_log  /dev/stderr warn;

    # Cloud Run's filesystem is read-only except /tmp.
    client_body_temp_path /tmp/nginx-client;
    proxy_temp_path       /tmp/nginx-proxy;
    fastcgi_temp_path     /tmp/nginx-fastcgi;
    scgi_temp_path        /tmp/nginx-scgi;
    uwsgi_temp_path       /tmp/nginx-uwsgi;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 512;

    server {
        listen      __PORT__;
        server_name _;
        root        /var/www/html/public;
        index       index.php;

        # Front controller: serve real files (e.g. /usephp.js), route
        # everything else to Relayer's single entrypoint.
        location / {
            try_files $uri /index.php$is_args$args;
        }

        location ~ \.php$ {
            include       fastcgi_params;
            fastcgi_pass  127.0.0.1:9000;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_param PATH_INFO $fastcgi_path_info;
            fastcgi_read_timeout 60s;
            fastcgi_buffers 16 16k;
            fastcgi_buffer_size 32k;
        }

        # Don't serve dotfiles (except ACME challenges).
        location ~ /\.(?!well-known) {
            deny all;
        }
    }
}
