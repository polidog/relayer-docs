; Production PHP overrides for the FrankenPHP image (Fly.io).
; Layered on top of $PHP_INI_DIR/php.ini-production (set in Dockerfile).
expose_php = Off
display_errors = Off
log_errors = On
; FrankenPHP/Caddy forwards stderr into Fly's logs.
error_log = /proc/self/fd/2

; Code is immutable inside the image — skip timestamp checks.
; Tuned small to fit the 256MB Fly VM: this app's compiled footprint
; is tiny (a handful of vendor + precompiled-PSX files), so a large
; opcache reservation would just waste the half the box's RAM.
opcache.enable = 1
opcache.validate_timestamps = 0
opcache.memory_consumption = 32
opcache.max_accelerated_files = 10000
opcache.interned_strings_buffer = 8
