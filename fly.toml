# Fly.io deployment for the Relayer docs site.
#
# The Dockerfile runs FrankenPHP (single process) serving plain HTTP
# on :8080 — see docker/Caddyfile — so internal_port below just has to
# match. The app does zero filesystem writes at runtime (Turso over
# HTTP, literal-ETag cache, NullProfiler), so the default rootfs is
# fine — nothing needs a volume.
#
# Docs content is NOT deployed here — it is written to Turso directly
# from a local machine with `bin/docs sync --prune`. This service only
# reads Turso. Credentials are Fly secrets, not in this file:
#   fly secrets set TURSO_DATABASE_URL=... TURSO_AUTH_TOKEN=...
#
# One-time setup and CI details: see .github/workflows/deploy.yml and
# the "本番デプロイ" section in README.md.

app = "relayer-doc"
primary_region = "nrt"   # Tokyo — was asia-northeast1 on Cloud Run

[build]
  dockerfile = "Dockerfile"

[env]
  APP_ENV = "production"
  # The repo .env is .dockerignore'd, so production i18n config must
  # live here. APP_LOCALE=ja makes ja the single resolved locale:
  # Relayer binds no locale *switching* (that needs APP_LOCALES with
  # 2+ entries), Request::locale() is "ja", and every page is served
  # byte-identically to the pre-i18n site (no /{locale} path prefix).
  # APP_LOCALES is deliberately omitted until the FrankenPHP path-
  # prefix 404 is diagnosed; adding it here later (e.g. "ja,en") is
  # what flips the live site bilingual.
  APP_LOCALE = "ja"

[http_service]
  internal_port = 8080
  force_https = true
  # Scale to zero like Cloud Run --min-instances 0: stop idle machines,
  # cold-start on the next request.
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

# Cheapest tier: smallest shared CPU + minimum RAM. Single machine
# (no HA) — a deliberate cost/availability trade-off for a low-traffic
# docs site, same spirit as scale-to-zero above. Keep deploys single
# with `fly deploy --ha=false`.
[[vm]]
  size = "shared-cpu-1x"   # smallest/cheapest CPU tier
  memory = "256mb"         # minimum RAM tier (opcache tuned to fit, see docker/php.ini)
